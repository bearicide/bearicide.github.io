name: HOME visible cleanup once

on:
  push:
    paths:
      - '.github/workflows/home-visible-cleanup-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace remaining visible MAIN wording in every HTML file
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          protected = {
              'MATTBEARCADE':'__MBCADE__',
              'bearicide.main':'__COUNTER_MAIN__',
              'main.js':'__MAIN_JS__',
              'main.css':'__MAIN_CSS__',
              'mainBranch':'__MAIN_BRANCH_CAMEL__',
              'main-':'__MAIN_DASH__',
          }
          changed=[]
          for p in Path('.').rglob('*.html'):
              if '.git' in p.parts:
                  continue
              s=p.read_text(encoding='utf-8',errors='ignore')
              o=s
              for k,v in protected.items():
                  s=s.replace(k,v)
              pairs=[
                  ('MAIN | MATTBEAR','HOME | MATTBEAR'),
                  ('MAIN hub','HOME hub'),
                  ('MAIN Hub','HOME Hub'),
                  ('MAIN home','HOME'),
                  ('MAIN visitor','HOME visitor'),
                  ('MAIN VISITOR','HOME VISITOR'),
                  ('MAIN VISITS','HOME VISITS'),
                  ('MAIN%20VISITS','HOME%20VISITS'),
                  ('MAIN is','HOME is'),
                  ('MAIN as','HOME as'),
                  ('MAIN repo','HOME repo'),
                  ('MAIN website','HOME website'),
                  ('MAIN site','HOME site'),
                  ('MAIN page','HOME page'),
                  ('MAIN Portal','HOME'),
                  ('Main Portal','HOME'),
                  ('main portal','HOME'),
                  ('Main ecosystem hub','HOME ecosystem hub'),
                  ('main ecosystem hub','HOME ecosystem hub'),
                  ('Main home','HOME'),
                  ('main home','HOME'),
                  ('Main Repo','HOME Repo'),
                  ('main repo','HOME repo'),
                  ('Main Website','HOME Website'),
                  ('main website','HOME website'),
                  ('Main Site','HOME Site'),
                  ('main site','HOME site'),
                  ('Main page','HOME page'),
                  ('main page','HOME page'),
                  ('Main index','HOME index'),
                  ('main index','HOME index'),
                  ('main/back','HOME/back'),
                  ('Back to Main','Back to HOME'),
                  ('back to Main','back to HOME'),
                  ('Return to Main','Return to HOME'),
                  ('return to Main','return to HOME'),
                  ('Go back to Main','Go back to HOME'),
                  ('Go to Main','Go to HOME'),
                  ('Main','HOME'),
                  ('MAIN','HOME'),
              ]
              for old,new in pairs:
                  s=s.replace(old,new)
              for k,v in protected.items():
                  s=s.replace(v,k)
              if s!=o:
                  p.write_text(s,encoding='utf-8')
                  changed.append(str(p))
          print('Changed files:')
          print('\n'.join(changed))
          PY
      - name: Remove workflow
        run: rm -f .github/workflows/home-visible-cleanup-once.yml
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No remaining HOME cleanup changes."
            exit 0
          fi
          git config user.name "MATTBEAR Repo Maintenance"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Clean remaining HOME labels across all visible site text"
          git push
