name: Pull Free Asset Vault

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull-free-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull assets from manifest
        run: |
          python3 - <<'PY'
          import json
          import os
          import shutil
          import urllib.request
          import zipfile
          from pathlib import Path

          manifest_path = Path('asset-library/free-asset-sources.json')
          downloads = Path('.asset-downloads')
          downloads.mkdir(exist_ok=True)

          with manifest_path.open('r', encoding='utf-8') as f:
            manifest = json.load(f)

          pulled = []
          for item in manifest.get('sources', []):
            title = item['title']
            url = item['downloadUrl']
            target = Path(item['targetPath'])
            target.mkdir(parents=True, exist_ok=True)
            zip_path = downloads / f"{item['id']}.zip"

            print(f"Downloading {title}...")
            request = urllib.request.Request(url, headers={'User-Agent': 'MATTBEAR-asset-vault/1.0'})
            with urllib.request.urlopen(request, timeout=120) as response, zip_path.open('wb') as out:
              shutil.copyfileobj(response, out)

            print(f"Extracting {title} -> {target}")
            with zipfile.ZipFile(zip_path, 'r') as z:
              z.extractall(target)

            pulled.append({
              'id': item['id'],
              'title': title,
              'source': item['source'],
              'sourcePage': item['sourcePage'],
              'license': item['license'],
              'creditRequired': item['creditRequired'],
              'targetPath': str(target).replace('\\', '/')
            })

          Path('assets-vault').mkdir(exist_ok=True)
          with Path('assets-vault/pulled-packs.json').open('w', encoding='utf-8') as f:
            json.dump({'updatedBy': 'pull-free-assets workflow', 'count': len(pulled), 'packs': pulled}, f, indent=2)
          PY

      - name: Write vault notes
        run: |
          cat > assets-vault/README.md <<'EOF'
          # MATTBEAR Asset Vault

          Legal free asset storage for MATTBEAR, Lovable, Unity, arcade, music, and web builds.

          ## Current source

          Assets are pulled from `asset-library/free-asset-sources.json`.

          ## Current starter pack

          - Kenney Input Prompts - CC0
          - Kenney UI Pack - CC0
          - Kenney UI Pack Sci-Fi - CC0
          - Kenney Board Game Icons - CC0
          - Kenney Interface Sounds - CC0
          - Kenney UI Audio - CC0
          - Kenney Casino Audio - CC0
          - Kenney Sci-Fi Sounds - CC0
          - Kenney Factory Kit - CC0
          - Kenney Platformer Kit - CC0
          - Kenney Modular Dungeon Kit - CC0
          - Kenney Modular Space Kit - CC0
          - Kenney City Kit Industrial - CC0

          ## Rule

          Keep source/license info with every imported asset pack. Do not dump random scraped art here. The landfill has enough ambition.
          EOF

          cat > assets-vault/credits.md <<'EOF'
          # Credits

          ## Kenney

          Source: https://kenney.nl/

          The pulled Kenney packs are listed as Creative Commons CC0 on their asset pages. Attribution is not required, but crediting Kenney is appreciated.

          Pulled packs are listed in:

          - `asset-library/free-asset-sources.json`
          - `assets-vault/pulled-packs.json`
          EOF

      - name: Build simple asset index
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          files = []
          for dirpath, _, filenames in os.walk('assets-vault'):
            if '.git' in dirpath:
              continue
            for name in filenames:
              path = os.path.join(dirpath, name).replace('\\', '/')
              files.append({
                'path': path,
                'name': name,
                'source': 'Kenney' if '/kenney/' in path else 'MATTBEAR',
                'license': 'CC0' if '/kenney/' in path else 'project'
              })

          with open('assets-vault/asset-index.json', 'w', encoding='utf-8') as f:
            json.dump({'updatedBy': 'pull-free-assets workflow', 'count': len(files), 'files': files}, f, indent=2)
          PY

      - name: Commit pulled assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets-vault asset-library/free-asset-sources.json .github/workflows/pull-free-assets.yml
          if git diff --cached --quiet; then
            echo "No asset changes to commit. Tiny mercy."
          else
            git commit -m "Pull CC0 free asset vault packs"
            git push
          fi
