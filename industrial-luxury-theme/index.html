<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MATTBEAR Industrial Luxury Demo</title>
<link rel="stylesheet" href="theme.css">
<style>
.wrap{max-width:1000px;margin:auto;padding:24px}
.hero{padding:48px 24px;margin-top:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.card{padding:18px}
small{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<div class="panel hero">
<h1>MATTBEAR</h1>
<p>Industrial luxury arcade ecosystem direction.</p>
<button class="btn-primary">Launch District</button>
<button class="btn-secondary">Open Showcase</button>
</div>

<div class="grid" style="margin-top:20px">
<div class="panel card">
<h2>Main Portal</h2>
<small>Core District</small>
</div>
<div class="panel card">
<h2>RETROCADE</h2>
<small>Arcade District</small>
</div>
<div class="panel card">
<h2>KARIMEF</h2>
<small>Showcase District</small>
</div>
</div>
</div>
</body>
</html>
