<style>:root{--bg:#0b0d12;--panel:rgba(255,255,255,.08);--text:#f7f9ff;--muted:#c9d0e3;--line:rgba(255,255,255,.13);--shadow:0 18px 40px rgba(0,0,0,.34);--r:#ff3a6d;--o:#ff9f1c;--y:#ffd93d;--g:#39ff92;--c:#35d9ff;--b:#5a7cff;--v:#cf5cff;--grad:linear-gradient(90deg,var(--r),var(--o),var(--y),var(--g),var(--c),var(--b),var(--v));--radius:24px;--wrap:1180px;--gap:18px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Bahnschrift,"Arial Narrow",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(53,217,255,.18),transparent 28%),radial-gradient(circle at top right,rgba(207,92,255,.15),transparent 26%),radial-gradient(circle at bottom left,rgba(57,255,146,.10),transparent 25%),linear-gradient(180deg,#0b0d12,#121722 48%,#0b0d12)}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.026) 0 1px,transparent 1px 4px);opacity:.45;mix-blend-mode:screen}a{color:inherit;text-decoration:none}.wrap{width:min(var(--wrap),calc(100% - 32px));margin:0 auto}.topbar{position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);background:rgba(11,13,18,.88);border-bottom:1px solid var(--line)}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0}.brand{display:flex;align-items:center;gap:12px}.badge{width:46px;height:46px;border-radius:16px;background:var(--grad);position:relative;box-shadow:0 0 24px rgba(255,255,255,.1)}.badge:after{content:"MB";position:absolute;inset:2px;border-radius:14px;background:#10141c;display:grid;place-items:center;font-weight:900}.brand strong{display:block;font-size:1.03rem;letter-spacing:.1em;text-transform:uppercase}.brand span{display:block;margin-top:4px;color:var(--muted);font-size:.75rem;letter-spacing:.07em;text-transform:uppercase}.navlinks{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.navlinks a,.btn{display:inline-flex;align-items:center;justify-content:center;min-hei
