<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="MATTBEAR neon ecosystem city background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242933"/>
      <stop offset="0.45" stop-color="#2b2f3a"/>
      <stop offset="1" stop-color="#191d26"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2d55"/>
      <stop offset="0.16" stop-color="#ff8a00"/>
      <stop offset="0.32" stop-color="#ffd600"/>
      <stop offset="0.48" stop-color="#39ff14"/>
      <stop offset="0.64" stop-color="#00e5ff"/>
      <stop offset="0.80" stop-color="#0066ff"/>
      <stop offset="1" stop-color="#ff00f5"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="12%" r="70%">
      <stop offset="0" stop-color="#ff3bdc" stop-opacity="0.55"/>
      <stop offset="0.28" stop-color="#35d9ff" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#39ff92" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#nebula)"/>
