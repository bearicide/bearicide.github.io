    <path d="M190 190 q47 -44 94 0" fill="none" stroke="#35d9ff" stroke-width="8" opacity="0.75"/>
    <circle cx="195" cy="198" r="28" fill="none" stroke="#ff3bdc" stroke-width="6"/><circle cx="280" cy="198" r="28" fill="none" stroke="#39ff92" stroke-width="6"/>
  </g>
  <g filter="url(#glow)">
    <rect x="1125" y="420" width="360" height="160" rx="18" fill="#181d27" stroke="url(#rainbow)" stroke-width="4" opacity="0.86"/>
    <text x="1305" y="500" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="58" fill="url(#rainbow)" letter-spacing="1">MATTBEAR</text>
    <text x="1305" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#f7f9ff" letter-spacing="8">CREATIVE SYSTEMS</text>
