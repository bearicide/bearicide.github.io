  </g>
  <g opacity="0.55">
    <g fill="#35d9ff"><rect x="132" y="570" width="10" height="10"/><rect x="160" y="594" width="10" height="10"/><rect x="392" y="510" width="10" height="10"/><rect x="650" y="455" width="10" height="10"/><rect x="910" y="488" width="10" height="10"/><rect x="1190" y="470" width="10" height="10"/></g>
    <g fill="#ff3bdc"><rect x="255" y="642" width="10" height="10"/><rect x="515" y="590" width="10" height="10"/><rect x="775" y="532" width="10" height="10"/><rect x="1055" y="552" width="10" height="10"/><rect x="1480" y="532" width="10" height="10"/></g>
    <g fill="#ffd600"><rect x="35" y="650" width="10" height="10"/><rect x="430" y="535" width="10" height="10"/><rect x="690" y="485" width="10" height="10"/><rect x="1230" y="498" width="10" height="10"/></g>
  </g>
